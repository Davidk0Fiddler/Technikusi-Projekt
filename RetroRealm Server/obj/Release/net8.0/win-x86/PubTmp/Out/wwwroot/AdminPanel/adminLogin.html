<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="adminLogin.css" />
  </head>
  <body>
    <div class="container">
      <h2>Admin Login</h2>

      <label for="admin-name-input">Admin Name</label>
      <input
        required
        id="admin-name-input"
        type="text"
        placeholder="Enter your admin name"
      />

      <label for="admin-password-input">Password</label>
      <input
        required
        id="admin-password-input"
        type="password"
        placeholder="Enter your password..."
      />

      <button id="submit-button">login</button>
    </div>

    <div id="loading-bg">
      <div class="loader"></div>
    </div>

    <script type="module" src="adminLogin.js"></script>
  </body>
</html>
